<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Micro d'Or - Version Finale</title>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1f29; padding: 30px; border-radius: 30px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-play { background: #1DB954; color: white; border: none; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; font-size: 30px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #2a303c; color: white; text-align: center; font-size: 18px; outline: none; box-sizing: border-box; }
        .verify { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #1DB954; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
        #unlocker { position:fixed; top:0; left:0; width:100%; height:100%; background:#0b0e14; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .feedback { margin-top: 20px; font-weight: bold; min-height: 40px; }
    </style>
</head>
<body>

<div id="unlocker">
    <button onclick="startEngine()" style="padding:25px 50px; border-radius:50px; border:none; background:#1DB954; color:white; font-weight:bold; font-size:20px; cursor:pointer;">LANCER LE JEU 🎧</button>
    <p style="margin-top:20px; color:#888; text-align:center;">Clique pour activer tes écouteurs Bluetooth</p>
</div>

<div class="card">
    <div id="artistDisplay" style="color:#1DB954; font-weight:bold; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px;">CHARGEMENT...</div>
    <button class="btn-play" onclick="playSound()">▶️</button>
    
    <input type="text" id="userInput" placeholder="Complète les paroles..." autocomplete="off">
    <button class="verify" onclick="checkAnswer()">VALIDER 🎤</button>
    
    <div id="feedback" class="feedback"></div>
</div>

<script>
    const songs = [
        { artist: "Céline Dion", url: "https://www.cjoint.com/doc/24_03/NCpuvYmO4J4_celine-extrait.mp3", endLyrics: "ENCORE" },
        { artist: "Indochine", url: "https://www.cjoint.com/doc/24_03/NCpuxmH8J4_indo-extrait.mp3", endLyrics: "LUNE" },
        { artist: "Goldman", url: "https://www.cjoint.com/doc/24_03/NCpuyG68J4_goldman-extrait.mp3", endLyrics: "SIGNE" }
    ];

    let audioCtx, gainNode, currentBuffer, currentSong;

    async function startEngine() {
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 1; 
        gainNode.connect(audioCtx.destination);
        
        document.getElementById('unlocker').style.display = 'none';
        loadNext();
    }

    async function loadNext() {
        document.getElementById('feedback').innerText = "Chargement morceau...";
        currentSong = songs[Math.floor(Math.random() * songs.length)];
        document.getElementById('artistDisplay').innerText = currentSong.artist;
        document.getElementById('userInput').value = "";
        
        try {
            const resp = await fetch(currentSong.url);
            const arrayBuf = await resp.arrayBuffer();
            currentBuffer = await audioCtx.decodeAudioData(arrayBuf);
            document.getElementById('feedback').innerText = "";
        } catch(e) {
            document.getElementById('feedback').innerText = "Erreur de chargement";
        }
    }

    function playSound() {
        if (!currentBuffer) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const source = audioCtx.createBufferSource();
        source.buffer = currentBuffer;
        source.connect(gainNode);
        source.start(0);
        
        document.getElementById('feedback').innerText = "Écoute bien...";
        setTimeout(() => { 
            source.stop(); 
            document.getElementById('feedback').innerText = "À toi de jouer !";
        }, 7000);
    }

    function checkAnswer() {
        const val = document.getElementById('userInput').value.toUpperCase().trim();
        if(val === currentSong.endLyrics) {
            document.getElementById('feedback').style.color = "#1DB954";
            document.getElementById('feedback').innerText = "BRAVO ! 🎉";
            setTimeout(loadNext, 2000);
        } else {
            document.getElementById('feedback').style.color = "#ff4444";
            document.getElementById('feedback').innerText = "NON ! C'était " + currentSong.endLyrics;
            setTimeout(loadNext, 3000);
        }
    }
</script>
</body>
</html>
