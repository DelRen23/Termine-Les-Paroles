<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Micro d'Or - Force Audio V3</title>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1f29; padding: 30px; border-radius: 30px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #333; }
        .btn-play { background: #1DB954; color: white; border: none; width: 90px; height: 90px; border-radius: 50%; cursor: pointer; font-size: 35px; margin-bottom: 20px; }
        #unlocker { position:fixed; top:0; left:0; width:100%; height:100%; background:#0b0e14; z-index:999; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="unlocker">
    <button onclick="startEngine()" style="padding:25px 50px; border-radius:50px; border:none; background:#1DB954; color:white; font-weight:bold; font-size:20px;">LANCER LE JEU 🎧</button>
</div>

<div class="card">
    <div id="artistDisplay" style="color:#1DB954; font-weight:bold; margin-bottom:10px;">PRÊT ?</div>
    <button class="btn-play" onclick="playSound()">▶️</button>
    <div id="feedback" style="margin-top:20px;"></div>
</div>

<script>
    const songs = [
        { artist: "Céline Dion", url: "https://www.cjoint.com/doc/24_03/NCpuvYmO4J4_celine-extrait.mp3" },
        { artist: "Indochine", url: "https://www.cjoint.com/doc/24_03/NCpuxmH8J4_indo-extrait.mp3" }
    ];

    let audioCtx, gainNode, currentBuffer;

    // Cette fonction initialise le son pour TOUS les navigateurs
    async function startEngine() {
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 1; // Volume max
        gainNode.connect(audioCtx.destination);
        
        document.getElementById('unlocker').style.display = 'none';
        loadNext();
    }

    async function loadNext() {
        const song = songs[Math.floor(Math.random() * songs.length)];
        document.getElementById('artistDisplay').innerText = song.artist;
        const resp = await fetch(song.url);
        const arrayBuf = await resp.arrayBuffer();
        currentBuffer = await audioCtx.decodeAudioData(arrayBuf);
    }

    function playSound() {
        if (!currentBuffer) return;
        
        // Relance le contexte s'il a été suspendu par le mode vibreur
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const source = audioCtx.createBufferSource();
        source.buffer = currentBuffer;
        source.connect(gainNode);
        source.start(0);
        
        document.getElementById('feedback').innerText = "Lecture...";
        setTimeout(() => { 
            source.stop(); 
            document.getElementById('feedback').innerText = "À toi !";
            loadNext(); 
        }, 7000);
    }
</script>
</body>
</html>
